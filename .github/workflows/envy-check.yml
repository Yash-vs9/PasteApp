name: Environment Drift Check

on: [push, pull_request]

jobs:
  envy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check environment drift
        run: |
          curl -f -X POST https://envy-kyuo.onrender.com/user/validate \
            -H "Content-Type: application/json" \
            -d '{"repoUrl": "${{ github.server_url }}/${{ github.repository }}"}'
